<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persistence</title>
<style>
:root { --fg:17,17,17; --bar-alpha:0.9; --bar-bg:rgba(255,255,255,var(--bar-alpha)); --bg-solid:#ffffff; --text:#14141f; --border:rgba(0,0,0,0.12); }
html[data-theme="dark"] { --fg:255,255,255; --bar-bg:rgba(10,10,15,var(--bar-alpha)); --bg-solid:#0a0a0f; --text:#f5f5fa; --border:rgba(255,255,255,0.12); }
* { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
html, body { width:100vw; height:100vh; overflow:hidden; }
body { background:var(--bar-bg); backdrop-filter:blur(24px) saturate(120%); -webkit-backdrop-filter:blur(24px) saturate(120%); border:1px solid var(--border); border-radius:10px; font-family:'SF Mono','Cascadia Code','Consolas',monospace; color:var(--text); position:relative; }
#stage { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
#content { display:flex; align-items:center; transform-origin:center center; white-space:nowrap; }
body.vertical #content { flex-direction:column; align-items:stretch; }
.brand { height:24px; width:auto; flex-shrink:0; margin-right:18px; }
body.vertical .brand { margin:0 auto 8px auto; height:30px; }
html[data-theme="dark"] .brand { filter:invert(1); }
.tiles { display:flex; }
body.vertical .tiles { display:grid; grid-template-columns:1fr 1fr; }
.tile { display:flex; flex-direction:column; justify-content:center; padding:0 14px; border-right:1px solid rgba(var(--fg),0.1); cursor:grab; }
.tile.dragging { opacity:0.35; }
.tile.drop-before { box-shadow:inset 3px 0 0 0 var(--text); }
.tile.drop-after { box-shadow:inset -3px 0 0 0 var(--text); }
body.vertical .tile.drop-before { box-shadow:inset 0 3px 0 0 var(--text); }
body.vertical .tile.drop-after { box-shadow:inset 0 -3px 0 0 var(--text); }
body.vertical .tile { border-right:none; border-bottom:1px solid rgba(var(--fg),0.08); padding:7px 14px; }
.tile-label { font-size:8px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(var(--fg),0.45); margin-bottom:2px; }
.tile-value { font-size:13px; font-weight:500; color:var(--text); letter-spacing:-0.2px; }
.tile-sub { font-size:8.5px; color:rgba(var(--fg),0.35); margin-top:1px; }
.up { color:#16a34a !important; }
.down { color:#dc2626 !important; }
.dim { color:rgba(var(--fg),0.55); }
.loading { animation:pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
.right { display:flex; align-items:center; gap:10px; margin-left:18px; }
body.vertical .right { margin:10px auto 0 auto; justify-content:center; flex-wrap:wrap; }
.period { display:flex; gap:1px; background:rgba(var(--fg),0.08); border-radius:5px; padding:1px; }
.period button { border:none; background:transparent; color:rgba(var(--fg),0.5); font-family:inherit; font-size:9px; font-weight:700; letter-spacing:.5px; padding:2px 5px; border-radius:4px; cursor:pointer; }
.period button.active { background:var(--text); color:var(--bg-solid); }
.time { font-size:12px; color:rgba(var(--fg),0.45); }
.sync-dot { width:6px; height:6px; border-radius:50%; background:rgba(var(--fg),0.85); flex-shrink:0; }
.sync-dot.error { background:transparent; border:1px solid rgba(var(--fg),0.6); }
.icon-btn { background:transparent; border:none; color:var(--text); cursor:pointer; font-size:14px; padding:2px 4px; opacity:0.65; font-family:inherit; }
.icon-btn:hover { opacity:1; }
.icon-btn.close-btn:hover { color:#dc2626; opacity:1; }
.btn-ask { background:transparent; border:1px solid rgba(var(--fg),0.4); color:var(--text); border-radius:4px; padding:4px 10px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; }
.btn-ask:hover { background:var(--text); color:var(--bg-solid); }
.btn-update { background:var(--text); color:var(--bg-solid); border-color:var(--text); animation:pulse 2.5s ease-in-out infinite; }
.btn-update:hover { animation:none; }
.btn-update:disabled { animation:none; opacity:0.6; cursor:wait; }
.winctl { display:flex; align-items:center; gap:2px; border-left:1px solid rgba(var(--fg),0.15); padding-left:8px; }
#pt-badge { display:none; font-size:8px; font-weight:700; letter-spacing:1px; border:1px solid rgba(var(--fg),0.5); border-radius:3px; padding:1px 4px; color:rgba(var(--fg),0.7); }
body.passthrough #pt-badge { display:block; }
body.passthrough #content { opacity:0.8; }
.rsz { position:absolute; z-index:50; }
.rsz-n { top:0; left:8px; right:8px; height:5px; cursor:ns-resize; }
.rsz-s { bottom:0; left:8px; right:8px; height:5px; cursor:ns-resize; }
.rsz-e { top:8px; bottom:8px; right:0; width:5px; cursor:ew-resize; }
.rsz-w { top:8px; bottom:8px; left:0; width:5px; cursor:ew-resize; }
.rsz-ne { top:0; right:0; width:11px; height:11px; cursor:nesw-resize; }
.rsz-nw { top:0; left:0; width:11px; height:11px; cursor:nwse-resize; }
.rsz-se { bottom:0; right:0; width:11px; height:11px; cursor:nwse-resize; }
.rsz-sw { bottom:0; left:0; width:11px; height:11px; cursor:nesw-resize; }
/* Settings panel: window grows downward, bar stays live in the top 52px */
body.settings-open #stage { bottom:auto; height:52px; }
#spanel { display:none; position:absolute; top:52px; left:0; right:0; bottom:0; overflow-y:auto; background:var(--bg-solid); border-top:1px solid rgba(var(--fg),0.15); padding:14px; -webkit-app-region:no-drag; }
body.settings-open #spanel { display:flex; flex-direction:column; gap:12px; }
#spanel .sec { border:1px solid rgba(var(--fg),0.16); border-radius:8px; padding:12px; flex-shrink:0; }
#spanel .sec-title { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:rgba(var(--fg),0.5); margin-bottom:10px; }
#spanel label.row { display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:11px; padding:4px 0; cursor:pointer; }
#spanel .metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 14px; }
#spanel input[type="range"] { width:130px; accent-color:var(--text); }
#spanel input[type="checkbox"] { accent-color:var(--text); }
#spanel select { font-family:inherit; font-size:11px; background:var(--bg-solid); color:var(--text); border:1px solid rgba(var(--fg),0.3); border-radius:4px; padding:2px 6px; }
#spanel .hk { display:flex; justify-content:space-between; font-size:10.5px; padding:3px 0; color:rgba(var(--fg),0.75); }
#spanel .hk kbd { font-family:inherit; border:1px solid rgba(var(--fg),0.3); border-radius:3px; padding:0 5px; font-size:9.5px; }
#spanel .btns { display:flex; gap:10px; flex-shrink:0; }
#spanel button.sbtn { flex:1; padding:10px; border:1px solid var(--text); background:var(--bg-solid); color:var(--text); font-size:10px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; font-family:inherit; border-radius:4px; }
#spanel button.sbtn.primary { background:var(--text); color:var(--bg-solid); }
/* Boot state: just the P logo, centered, until first data render */
#boot { display:none; position:absolute; inset:0; align-items:center; justify-content:center; z-index:40; }
body.booting #boot { display:flex; }
body.booting #content { visibility:hidden; }
#boot img { height:26px; width:auto; animation:pulse 1.4s ease-in-out infinite; }
html[data-theme="dark"] #boot img { filter:invert(1); }
</style>
</head>
<body class="booting" data-tauri-drag-region>
<div id="boot" data-tauri-drag-region><img src="logo.png" alt="Persistence"></div>
<div id="stage" data-tauri-drag-region>
<div id="content">
<img class="brand" src="logo.png" alt="Persistence" data-tauri-drag-region>
<div class="tiles" id="tiles"></div>
<div class="right">
<div class="period" id="period">
<button data-p="day" class="active" onclick="setPeriod('day')">1D</button>
<button data-p="week" onclick="setPeriod('week')">1W</button>
<button data-p="month" onclick="setPeriod('month')">1M</button>
</div>
<button class="icon-btn" id="theme-btn" title="Toggle light/dark" onclick="toggleTheme()">&#9680;</button>
<button class="icon-btn" id="settings-btn" title="Settings" onclick="toggleSettingsPanel()">&#9881;</button>
<div id="pt-badge" title="Click-through is ON (Ctrl+Shift+P to turn off)">GHOST</div>
<div class="sync-dot" id="sync-dot" title="Data sync status"></div>
<div class="time" id="clock"></div>
<button class="btn-ask" onclick="openDashboard()">Open</button>
<button class="btn-ask btn-update" id="update-btn" style="display:none" onclick="installUpdate()" title="A new version is ready. One click downloads, installs, and restarts the app for you."></button>
<div class="winctl">
<button class="icon-btn" title="Minimize to taskbar" onclick="minimizeBar()">&#8722;</button>
<button class="icon-btn close-btn" title="Quit Persistence" onclick="quitApp()">&#215;</button>
</div>
</div>
</div>
</div>
<div class="rsz rsz-n"></div><div class="rsz rsz-s"></div><div class="rsz rsz-e"></div><div class="rsz rsz-w"></div>
<div class="rsz rsz-ne"></div><div class="rsz rsz-nw"></div><div class="rsz rsz-se"></div><div class="rsz rsz-sw"></div>
<div id="spanel"></div>
<script src="login.js"></script><script>
const { invoke } = window.__TAURI__?.core || { invoke: () => Promise.reject('no tauri') };
const winApi = window.__TAURI__?.window;
const eventApi = window.__TAURI__?.event;
function appWin(){ try { return winApi && winApi.getCurrentWindow ? winApi.getCurrentWindow() : (winApi && winApi.appWindow) || null; } catch(e){ return null; } }
let data = null;
let history = [];
let period = 'day';
let refreshTimer = null;

// ---- Settings (persisted) ----
const SETTINGS_KEY = 'persistence-hud-settings';
const DEFAULT_SETTINGS = {
  opacity: 90,            // bar background opacity, percent
  refreshMin: 5,          // data refresh interval, minutes
  autostart: true,        // launch on login
  order: ['netWorth','cash','investments','retirement','debt','monthlyBills','safeToSpend','creditCards','bills7d','goals'],
  metrics: { netWorth:true, cash:true, investments:true, retirement:true, debt:true,
             monthlyBills:true, safeToSpend:true, creditCards:true, bills7d:true, goals:true }
};
let settings = loadSettings();
function mergeSettings(s){
  const out = Object.assign({}, DEFAULT_SETTINGS, s || {});
  out.metrics = Object.assign({}, DEFAULT_SETTINGS.metrics, (s && s.metrics) || {});
  // Saved order, scrubbed of unknown keys, with any new metrics appended at the end.
  const saved = (s && Array.isArray(s.order)) ? s.order.filter(k => DEFAULT_SETTINGS.order.includes(k)) : [];
  out.order = saved.concat(DEFAULT_SETTINGS.order.filter(k => !saved.includes(k)));
  return out;
}
function loadSettings(){
  let s = {};
  try { s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); } catch(e) {}
  return mergeSettings(s);
}
function saveSettings(){ try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch(e) {} }
function applyOpacity(){ document.documentElement.style.setProperty('--bar-alpha', String(Math.min(100, Math.max(20, settings.opacity)) / 100)); }
function scheduleRefresh(){ if(refreshTimer) clearInterval(refreshTimer); refreshTimer = setInterval(fetchData, Math.max(1, settings.refreshMin) * 60 * 1000); }

function applyTheme(t){ document.documentElement.dataset.theme=t; try{ localStorage.setItem('persistence-theme',t); }catch(e){} }
function toggleTheme(){ const cur=document.documentElement.dataset.theme==='dark'?'dark':'light'; applyTheme(cur==='dark'?'light':'dark'); }
(function(){ let t='light'; try{ t=localStorage.getItem('persistence-theme')||'light'; }catch(e){} document.documentElement.dataset.theme=t; })();
function updateClock(){ const d=new Date(); let h=d.getHours(); const m=d.getMinutes(); const ampm=h>=12?'PM':'AM'; if(h>12)h-=12; if(h===0)h=12; document.getElementById('clock').textContent=h+':'+String(m).padStart(2,'0')+' '+ampm; }
setInterval(updateClock,10000); updateClock();

// Scale the whole HUD to fit the window at any size/shape, never clipping.
let fitRAF=null;
function fit(){
  const c=document.getElementById('content'); if(!c) return;
  const W=window.innerWidth;
  const H=document.body.classList.contains('settings-open') ? 52 : window.innerHeight;
  document.body.classList.toggle('vertical', (W/H) < 1.15);
  c.style.transform='none';
  const cw=c.offsetWidth||1, ch=c.offsetHeight||1;
  let s=Math.min(W/cw, H/ch)*0.94;
  if(!isFinite(s)||s<=0) s=1;
  s=Math.max(0.12, Math.min(s, 8));
  c.style.transform='scale('+s+')';
}
function scheduleFit(){ if(fitRAF) cancelAnimationFrame(fitRAF); fitRAF=requestAnimationFrame(fit); }
window.addEventListener('resize', scheduleFit);

async function fetchData(){
  try{
    const s=await invoke('fetch_summary'); const c=s||{};
    data={
      netWorth:Math.round(Number(c.net_worth)||0),
      cash:Math.round(Number(c.cash)||0),
      investments:Math.round(Number(c.investments)||0),
      retirement:Math.round(Number(c.retirement)||0),
      debt:Math.round(Number(c.total_debt)||0),
      monthlyBills:Math.round(Number(c.monthly_bills)||0),
      safeToSpend:c.safe_to_spend||null,
      creditWeek:c.credit_week?Math.round(Number(c.credit_week.spent)||0):null,
      bills7d:c.bills_7d||null,
      goalProgress:c.goal_progress||null
    };
    try{ const h=await invoke('fetch_history'); history=Array.isArray(h)?h:[]; }catch(he){ console.error('fetch_history error:',he); }
    renderTiles();
    document.getElementById('sync-dot').className='sync-dot';
  }catch(err){
    console.error('fetch_summary error:',err);
    document.getElementById('sync-dot').className='sync-dot error';
    // Dead session (expired/rotated tokens): clear them and reload, which
    // sends the user to the sign-in screen instead of loading forever.
    const s=String(err);
    if(!window.__reauthing && (s.indexOf('Session expired')>=0 || s.indexOf('Not logged in')>=0)){
      window.__reauthing=true;
      try{ await invoke('logout'); }catch(e){}
      location.reload();
    }
  }
}
function fmt(n){ if(Math.abs(n)>=1000000) return '$'+(n/1000000).toFixed(1)+'M'; if(Math.abs(n)>=1000) return '$'+Math.round(n/1000)+'k'; return '$'+Math.round(n); }
function computeDeltas(){
  if(!data||!history.length) return {};
  const daysBack=period==='day'?1:period==='week'?7:30;
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-daysBack);
  const sorted=[...history].sort((a,b)=>new Date(a.snapshot_date)-new Date(b.snapshot_date));
  let past=sorted[0];
  for(const r of sorted){ if(new Date(r.snapshot_date)<=cutoff) past=r; }
  const b=(past&&past.breakdown)?past.breakdown:{};
  const prev={netWorth:Number(past&&past.net_worth),cash:Number(b.cash),investments:Number(b.investments),retirement:Number(b.retirement),debt:Number(b.debt)};
  const out={};
  for(const k of ['netWorth','cash','investments','retirement','debt']){
    const now=Number(data[k]); const was=prev[k];
    if(was===undefined||isNaN(was)||isNaN(now)){ out[k]=null; continue; }
    const diff=now-was; const pct=was!==0?(diff/Math.abs(was))*100:null;
    out[k]={diff,pct};
  }
  return out;
}
function setPeriod(p){ period=p; document.querySelectorAll('#period button').forEach(b=>b.classList.toggle('active',b.dataset.p===p)); renderTiles(); }
function tile(key,label,value,sub,cls,delta,goodUp){
  let vcls=cls||''; let subHtml='<div class="tile-sub">'+sub+'</div>';
  if(delta&&delta.diff!==0&&!isNaN(delta.diff)){
    const up=delta.diff>0; const positive=goodUp?up:!up; const dir=positive?'up':'down';
    const arrow=up?'\u25b2':'\u25bc';
    const pct=(delta.pct===null||!isFinite(delta.pct))?'':' '+Math.abs(delta.pct).toFixed(1)+'%';
    vcls=(cls?cls+' ':'')+dir;
    subHtml='<div class="tile-sub '+dir+'">'+arrow+pct+'</div>';
  }
  return '<div class="tile" draggable="true" data-key="'+key+'" onclick="openDashboard()"><div class="tile-label">'+label+'</div><div class="tile-value '+vcls+'">'+value+'</div>'+subHtml+'</div>';
}
function weekdayShort(iso){ try{ return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{weekday:'short'}); }catch(e){ return ''; } }
// One builder per metric; returns the tile HTML or '' when hidden / no data.
const TILE_BUILDERS={
  netWorth:    (d)=>tile('netWorth','Net Worth',fmt(data.netWorth),'all accounts','',d.netWorth,true),
  cash:        (d)=>tile('cash','Cash',fmt(data.cash),'checking + savings','',d.cash,true),
  investments: (d)=>tile('investments','Investments',fmt(data.investments),'brokerage','dim',d.investments,true),
  retirement:  (d)=>tile('retirement','Retirement',fmt(data.retirement),'401k + IRA','dim',d.retirement,true),
  debt:        (d)=>tile('debt','Debt',(data.debt>0?fmt(data.debt):'None'),'credit + loans','',d.debt,false),
  monthlyBills:(d)=>tile('monthlyBills','Monthly Bills',fmt(data.monthlyBills),'recurring','dim',null,true),
  safeToSpend: (d)=>{ if(!data.safeToSpend) return '';
    const a=Math.round(Number(data.safeToSpend.amount)||0);
    return tile('safeToSpend','Safe to Spend',fmt(a),'until '+weekdayShort(data.safeToSpend.until),a<0?'down':'up',null,true); },
  creditCards: (d)=>{ if(data.creditWeek===null) return '';
    const v=data.creditWeek;
    return tile('creditCards','Credit Cards',(v>0?'+':'')+fmt(v),'this week',v>0?'down':(v<0?'up':''),null,false); },
  bills7d:     (d)=>{ if(!data.bills7d) return '';
    return tile('bills7d','Bills 7 Days',fmt(Math.round(Number(data.bills7d.total)||0)),(data.bills7d.count||0)+' due','',null,true); },
  goals:       (d)=>{ if(!data.goalProgress||data.goalProgress.status==='none') return '';
    const g=data.goalProgress;
    const val=g.status==='behind'?('Behind '+fmt(Math.abs(g.diff))):(g.status==='ahead'?('Ahead '+fmt(g.diff)):'On track');
    return tile('goals','Goals',val,g.goals_count+' tracked',g.status==='behind'?'down':'up',null,true); },
};
function renderTiles(){ if(!data) return; const d=computeDeltas(); const m=settings.metrics; let html='';
  for(const k of settings.order){ if(m[k]&&TILE_BUILDERS[k]) html+=TILE_BUILDERS[k](d); }
  document.getElementById('tiles').innerHTML=html;
  document.body.classList.remove('booting');
  scheduleFit();
}
// ---- Drag-and-drop tile reordering ----
let dragKey=null;
let didDrag=false;
function initTileDrag(){
  const c=document.getElementById('tiles');
  c.addEventListener('dragstart',(e)=>{
    const t=e.target.closest('.tile'); if(!t) return;
    dragKey=t.dataset.key; didDrag=true;
    t.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    try{ e.dataTransfer.setData('text/plain',dragKey); }catch(err){}
  });
  c.addEventListener('dragover',(e)=>{
    if(!dragKey) return;
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    const t=e.target.closest('.tile');
    c.querySelectorAll('.tile').forEach(x=>x.classList.remove('drop-before','drop-after'));
    if(!t||t.dataset.key===dragKey) return;
    const r=t.getBoundingClientRect();
    const vertical=document.body.classList.contains('vertical');
    const before=vertical ? (e.clientY < r.top+r.height/2) : (e.clientX < r.left+r.width/2);
    t.classList.add(before?'drop-before':'drop-after');
  });
  c.addEventListener('drop',(e)=>{
    if(!dragKey) return;
    e.preventDefault();
    const t=e.target.closest('.tile');
    if(t&&t.dataset.key!==dragKey){
      const r=t.getBoundingClientRect();
      const vertical=document.body.classList.contains('vertical');
      const before=vertical ? (e.clientY < r.top+r.height/2) : (e.clientX < r.left+r.width/2);
      const ord=settings.order.filter(k=>k!==dragKey);
      let idx=ord.indexOf(t.dataset.key);
      if(!before) idx++;
      ord.splice(idx,0,dragKey);
      settings.order=ord; saveSettings();
    }
    endTileDrag();
    renderTiles();
  });
  c.addEventListener('dragend',endTileDrag);
}
function endTileDrag(){
  dragKey=null;
  document.querySelectorAll('#tiles .tile').forEach(x=>x.classList.remove('dragging','drop-before','drop-after'));
  setTimeout(()=>{ didDrag=false; },250);
}
function openDashboard(){ if(didDrag) return; if(window.__TAURI__&&window.__TAURI__.shell){ window.__TAURI__.shell.open('https://ledger-theta-puce.vercel.app'); } }
function minimizeBar(){ invoke('minimize_bar').catch(e=>console.error('minimize_bar',e)); }
function quitApp(){ invoke('quit_app').catch(e=>console.error('quit_app',e)); }

// ---- Auto-update ----
async function checkForUpdate(){
  try{
    const u=await invoke('check_update');
    if(u&&u.version){
      const b=document.getElementById('update-btn');
      b.textContent='Update to v'+u.version+' - restarts app';
      b.style.display=''; scheduleFit();
    }
  }catch(e){ console.error('check_update',e); }
}
function installUpdate(){
  const b=document.getElementById('update-btn');
  b.disabled=true; b.textContent='Updating... app will restart';
  invoke('install_update').catch(err=>{
    console.error('install_update',err);
    b.disabled=false; b.textContent='Update failed - click to retry';
  });
}

// ---- Settings panel (window grows downward; bar stays live on top) ----
const METRIC_LABELS={ netWorth:'Net Worth', cash:'Cash', investments:'Investments', retirement:'Retirement',
  debt:'Debt', monthlyBills:'Monthly Bills', safeToSpend:'Safe to Spend', creditCards:'Credit Cards',
  bills7d:'Bills Next 7 Days', goals:'Goal Progress' };
let settingsOpen=false;
function toggleSettingsPanel(){ if(settingsOpen){ closeSettingsPanel(); } else { openSettingsPanel(); } }
async function openSettingsPanel(){
  if(settingsOpen) return; settingsOpen=true;
  try{ await invoke('size_for_settings'); }catch(e){ console.error('size_for_settings',e); }
  const el=document.getElementById('spanel');
  let metricRows='';
  for(const k of Object.keys(METRIC_LABELS)){
    metricRows+='<label class="row"><span>'+METRIC_LABELS[k]+'</span><input type="checkbox" data-metric="'+k+'"'+(settings.metrics[k]?' checked':'')+'></label>';
  }
  el.innerHTML=
    '<div class="sec"><div class="sec-title">Appearance</div>'+
      '<label class="row"><span>Bar opacity</span><span><input type="range" id="set-opacity" min="20" max="100" value="'+settings.opacity+'"> <span id="opacity-val">'+settings.opacity+'%</span></span></label>'+
      '<label class="row"><span>Dark theme</span><input type="checkbox" id="set-dark"'+(document.documentElement.dataset.theme==='dark'?' checked':'')+'></label>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Metrics shown</div><div class="metrics-grid">'+metricRows+'</div>'+
      '<div style="font-size:9.5px;color:rgba(var(--fg),0.45);margin-top:6px;">Tip: drag tiles on the bar to reorder them.</div></div>'+
    '<div class="sec"><div class="sec-title">Behavior</div>'+
      '<label class="row"><span>Refresh data every</span><select id="set-refresh">'+
        [1,5,15,30].map(n=>'<option value="'+n+'"'+(settings.refreshMin===n?' selected':'')+'>'+n+' min</option>').join('')+
      '</select></label>'+
      '<label class="row"><span>Launch at startup</span><input type="checkbox" id="set-autostart"'+(settings.autostart?' checked':'')+'></label>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Hotkeys</div>'+
      '<div class="hk"><span>Show / hide HUD</span><kbd>Ctrl+Shift+H</kbd></div>'+
      '<div class="hk"><span>Click-through (ghost) mode</span><kbd>Ctrl+Shift+P</kbd></div>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Support</div>'+
      '<div class="hk"><span>Questions or problems?</span><span style="text-decoration:underline;cursor:pointer;" onclick="openSupport()">support@persistence.finance</span></div>'+
    '</div>'+
    '<div class="btns"><button class="sbtn" id="set-signout">Sign Out</button><button class="sbtn primary" id="set-done">Done</button></div>';
  document.body.classList.add('settings-open');
  el.querySelector('#set-opacity').addEventListener('input',(e)=>{
    settings.opacity=parseInt(e.target.value,10); el.querySelector('#opacity-val').textContent=settings.opacity+'%';
    applyOpacity(); saveSettings();
  });
  el.querySelector('#set-dark').addEventListener('change',(e)=>{ applyTheme(e.target.checked?'dark':'light'); });
  el.querySelectorAll('input[data-metric]').forEach(cb=>{
    cb.addEventListener('change',()=>{ settings.metrics[cb.dataset.metric]=cb.checked; saveSettings(); renderTiles(); });
  });
  el.querySelector('#set-refresh').addEventListener('change',(e)=>{
    settings.refreshMin=parseInt(e.target.value,10); saveSettings(); scheduleRefresh();
  });
  el.querySelector('#set-autostart').addEventListener('change',(e)=>{
    settings.autostart=e.target.checked; saveSettings();
    invoke('set_autostart',{enabled:settings.autostart}).catch(err=>console.error('set_autostart',err));
  });
  el.querySelector('#set-signout').addEventListener('click',async()=>{
    try{ await invoke('logout'); }catch(e){}
    await closeSettingsPanel();
    location.reload();
  });
  el.querySelector('#set-done').addEventListener('click',closeSettingsPanel);
  scheduleFit();
}
async function closeSettingsPanel(){
  if(!settingsOpen) return; settingsOpen=false;
  document.body.classList.remove('settings-open');
  document.getElementById('spanel').innerHTML='';
  try{ await invoke('restore_after_settings'); }catch(e){ console.error('restore_after_settings',e); }
  scheduleFit();
}
function openSupport(){ if(window.__TAURI__&&window.__TAURI__.shell){ window.__TAURI__.shell.open('mailto:support@persistence.finance'); } }

function initResize(){
  const dirs={'rsz-n':'North','rsz-s':'South','rsz-e':'East','rsz-w':'West','rsz-ne':'NorthEast','rsz-nw':'NorthWest','rsz-se':'SouthEast','rsz-sw':'SouthWest'};
  document.querySelectorAll('.rsz').forEach(h=>{
    const key=Object.keys(dirs).find(k=>h.classList.contains(k));
    h.addEventListener('mousedown', async (e)=>{ e.preventDefault(); const w=appWin(); try{ if(w&&w.startResizeDragging) await w.startResizeDragging(dirs[key]); }catch(err){ console.error('resize',err); } });
  });
}
function initEvents(){
  if(!eventApi||!eventApi.listen) return;
  eventApi.listen('passthrough-changed',(e)=>{ document.body.classList.toggle('passthrough', !!e.payload); }).catch(()=>{});
  eventApi.listen('open-settings',()=>{ openSettingsPanel(); }).catch(()=>{});
}
(async()=>{
  initResize(); initEvents(); initTileDrag(); applyOpacity(); fit();
  await window.ensureAuth();
  invoke('set_autostart',{enabled:settings.autostart}).catch(()=>{});
  invoke('get_passthrough').then(p=>document.body.classList.toggle('passthrough',!!p)).catch(()=>{});
  await fetchData(); fit();
  scheduleRefresh();
  checkForUpdate();
  setInterval(checkForUpdate, 4*60*60*1000);
})();
</script>
</body>
</html>
