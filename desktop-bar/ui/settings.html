<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persistence Settings</title>
<style>
:root { --fg:17,17,17; --bg:#ffffff; --text:#14141f; }
html[data-theme="dark"] { --fg:255,255,255; --bg:#0a0a0f; --text:#f5f5fa; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
html, body { width:100vw; height:100vh; overflow:hidden; }
body { background:var(--bg); color:var(--text); font-family:'SF Mono','Cascadia Code','Consolas',monospace; display:flex; flex-direction:column; }
#titlebar { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; flex-shrink:0; }
#titlebar h1 { font-size:12px; letter-spacing:3px; text-transform:uppercase; font-weight:600; }
#close-btn { display:none; }
#scroll { flex:1; overflow-y:auto; padding:4px 14px 14px; display:flex; flex-direction:column; gap:12px; }
.sec { border:1px solid rgba(var(--fg),0.16); border-radius:8px; padding:12px; flex-shrink:0; }
.sec-title { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:rgba(var(--fg),0.5); margin-bottom:10px; }
label.row { display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:11px; padding:4px 0; cursor:pointer; }
.metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 14px; }
input[type="range"] { width:130px; accent-color:var(--text); }
input[type="checkbox"] { accent-color:var(--text); }
select { font-family:inherit; font-size:11px; background:var(--bg); color:var(--text); border:1px solid rgba(var(--fg),0.3); border-radius:4px; padding:2px 6px; }
.hk { display:flex; justify-content:space-between; font-size:10.5px; padding:3px 0; color:rgba(var(--fg),0.75); }
.hk kbd { font-family:inherit; border:1px solid rgba(var(--fg),0.3); border-radius:3px; padding:0 5px; font-size:9.5px; }
.btns { display:flex; gap:10px; flex-shrink:0; padding:0 14px 14px; }
button.sbtn { flex:1; padding:10px; border:1px solid var(--text); background:var(--bg); color:var(--text); font-size:10px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; font-family:inherit; border-radius:4px; }
button.sbtn.primary { background:var(--text); color:var(--bg); }
.hint { font-size:9.5px; color:rgba(var(--fg),0.45); line-height:1.5; margin-top:6px; }
</style>
</head>
<body>
<div id="titlebar"><h1>Settings</h1><button id="close-btn" title="Close" onclick="closeWin()">&#215;</button></div>
<div id="scroll">
  <div class="sec"><div class="sec-title">Appearance</div>
    <label class="row"><span>Bar opacity</span><span><input type="range" id="set-opacity" min="20" max="100"> <span id="opacity-val"></span></span></label>
    <label class="row"><span>Dark theme</span><input type="checkbox" id="set-dark"></label>
  </div>
  <div class="sec"><div class="sec-title">Metrics shown</div>
    <div class="metrics-grid" id="metrics"></div>
    <div class="hint">Tip: drag tiles on the bar itself to reorder them.</div>
  </div>
  <div class="sec"><div class="sec-title">Behavior</div>
    <label class="row"><span>Refresh data every</span><select id="set-refresh"></select></label>
    <label class="row"><span>Launch at startup</span><input type="checkbox" id="set-autostart"></label>
  </div>
  <div class="sec"><div class="sec-title">Hotkeys</div>
    <div class="hk"><span>Show / hide HUD</span><kbd>Ctrl+Shift+H</kbd></div>
    <div class="hk"><span>Click-through (ghost) mode</span><kbd>Ctrl+Shift+P</kbd></div>
  </div>
  <div class="sec"><div class="sec-title">Support</div>
    <div class="hk"><span>Questions or problems?</span><span style="text-decoration:underline;cursor:pointer;" onclick="openSupport()">support@persistence.finance</span></div>
  </div>
</div>
<div class="btns"><button class="sbtn" onclick="signOut()">Sign Out</button><button class="sbtn primary" onclick="closeWin()">Done</button></div>
<script>
const { invoke } = window.__TAURI__?.core || { invoke: () => Promise.reject('no tauri') };
const eventApi = window.__TAURI__?.event;
const SETTINGS_KEY = 'persistence-hud-settings';
const METRIC_LABELS = { netWorth:'Net Worth', cash:'Cash', investments:'Investments', retirement:'Retirement',
  debt:'Debt', monthlyBills:'Monthly Bills', safeToSpend:'Safe to Spend', creditCards:'Credit Cards',
  bills7d:'Bills Next 7 Days', goals:'Goal Progress' };
const DEFAULTS = { opacity:90, refreshMin:5, autostart:true,
  order:['netWorth','cash','investments','retirement','debt','monthlyBills','safeToSpend','creditCards','bills7d','goals'],
  metrics:{ netWorth:true, cash:true, investments:true, retirement:true, debt:true, monthlyBills:true, safeToSpend:true, creditCards:true, bills7d:true, goals:true } };
let settings = load();
function load(){
  let s={}; try{ s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'); }catch(e){}
  const out=Object.assign({}, DEFAULTS, s);
  out.metrics=Object.assign({}, DEFAULTS.metrics, s.metrics||{});
  const saved=Array.isArray(s.order)?s.order.filter(k=>DEFAULTS.order.includes(k)):[];
  out.order=saved.concat(DEFAULTS.order.filter(k=>!saved.includes(k)));
  return out;
}
function persist(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }catch(e){}
  if(eventApi&&eventApi.emit) eventApi.emit('settings-changed', settings).catch(()=>{});
}
function applyTheme(t){ document.documentElement.dataset.theme=t; try{ localStorage.setItem('persistence-theme',t); }catch(e){} if(eventApi&&eventApi.emit) eventApi.emit('theme-changed', t).catch(()=>{}); }
function closeWin(){ invoke('close_settings').catch(()=>{}); }
function openSupport(){ if(window.__TAURI__&&window.__TAURI__.shell){ window.__TAURI__.shell.open('mailto:support@persistence.finance'); } }
async function signOut(){
  try{ await invoke('logout'); }catch(e){}
  if(eventApi&&eventApi.emit) await eventApi.emit('signed-out', null).catch(()=>{});
  closeWin();
}
(function init(){
  let t='light'; try{ t=localStorage.getItem('persistence-theme')||'light'; }catch(e){}
  document.documentElement.dataset.theme=t;
  const op=document.getElementById('set-opacity'); const ov=document.getElementById('opacity-val');
  op.value=settings.opacity; ov.textContent=settings.opacity+'%';
  op.addEventListener('input',()=>{ settings.opacity=parseInt(op.value,10); ov.textContent=settings.opacity+'%'; persist(); });
  const dark=document.getElementById('set-dark');
  dark.checked = t==='dark';
  dark.addEventListener('change',()=>applyTheme(dark.checked?'dark':'light'));
  const grid=document.getElementById('metrics');
  for(const k of Object.keys(METRIC_LABELS)){
    const label=document.createElement('label'); label.className='row';
    const span=document.createElement('span'); span.textContent=METRIC_LABELS[k];
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=!!settings.metrics[k];
    cb.addEventListener('change',()=>{ settings.metrics[k]=cb.checked; persist(); });
    label.appendChild(span); label.appendChild(cb); grid.appendChild(label);
  }
  const sel=document.getElementById('set-refresh');
  for(const n of [1,5,15,30]){ const o=document.createElement('option'); o.value=n; o.textContent=n+' min'; if(settings.refreshMin===n)o.selected=true; sel.appendChild(o); }
  sel.addEventListener('change',()=>{ settings.refreshMin=parseInt(sel.value,10); persist(); });
  const auto=document.getElementById('set-autostart');
  auto.checked=!!settings.autostart;
  auto.addEventListener('change',()=>{ settings.autostart=auto.checked; persist(); invoke('set_autostart',{enabled:settings.autostart}).catch(()=>{}); });
})();
</script>
</body>
</html>
