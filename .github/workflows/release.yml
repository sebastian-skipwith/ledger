name: Release Desktop HUD

# Manual-only: releases are built locally because updater signing requires the
# private key at C:\Users\sebas\.tauri\persistence-updater.key (never in CI).
# Running this workflow without that key fails at the signing step.
on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Build and release HUD installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-bar
          tagName: ${{ github.ref_name }}
          releaseName: 'Ledger HUD ${{ github.ref_name }}'
          releaseBody: 'Ledger persistent financial HUD — desktop installers.'
          releaseDraft: true
          prerelease: false
