version: 2
updates:
  # ── npm packages ──────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend-deps:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend-deps:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      mcp-deps:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/desktop-bar"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      desktop-deps:
        patterns: ["*"]

  # ── Rust (Tauri desktop app) ──────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/desktop-bar/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      tauri-deps:
        patterns: ["*"]

  # ── GitHub Actions workflows ──────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
